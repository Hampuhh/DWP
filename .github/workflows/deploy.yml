name: Deploy a GitHub Pages

on:
  # Cada push a main reconstruye y publica
  push:
    branches: [main]
  # También permite lanzarlo manualmente desde la pestaña Actions
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Una sola corrida a la vez; si llega otra, se cancela la previa
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        env:
          # Se inyecta el usuario y nombre de repo en astro.config.mjs
          # para que site / base se generen correctos
          PUBLIC_GH_USER: ${{ github.repository_owner }}
          PUBLIC_GH_REPO: ${{ github.event.repository.name }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
