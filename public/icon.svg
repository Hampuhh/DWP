<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Editorial cover icon — full bleed marfil + italic 'D' + dot terracota + sello DWP -->
  <rect width="512" height="512" fill="#F5F1EA"/>

  <!-- Marco hairline editorial restado del bleed para no caer en el squircle de iOS -->
  <rect x="32" y="32" width="448" height="448" fill="none" stroke="#2A2825" stroke-width="1.5" stroke-opacity="0.18"/>

  <!-- 'D' itálica gigante, Cormorant Garamond -->
  <text x="256" y="358"
        text-anchor="middle"
        font-family="Cormorant Garamond, Georgia, serif"
        font-style="italic"
        font-weight="500"
        font-size="380"
        fill="#2A2825">D</text>

  <!-- Dot terracota -->
  <circle cx="382" cy="345" r="11" fill="#B97A57"/>

  <!-- Sello editorial pequeño -->
  <text x="256" y="448"
        text-anchor="middle"
        font-family="JetBrains Mono, Menlo, monospace"
        font-size="20"
        letter-spacing="8"
        fill="#2A2825"
        fill-opacity="0.55">DWP · VOL I</text>
</svg>
